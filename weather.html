<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天気情報</title>

<style>
body { font-family: sans-serif; margin: 0; padding: 0; }

/* ハンバーガー */
.header {
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
}

.menu-btn {
  font-size: 24px;
  cursor: pointer;
  margin-right: 15px;
}

.menu {
  position: fixed;
  top: 0;
  left: -250px;
  width: 200px;
  height: 100%;
  background: #333;
  color: white;
  padding: 20px;
  transition: 0.3s;
}

.menu.open { left: 0; }

.menu a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 10px 0;
}

/* コンテンツ */
.container {
  padding: 20px;
}

input {
  width: 70%;
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px;
  font-size: 16px;
}

.day {
  margin-top: 15px;
  padding: 15px;
  background: #e3f2fd;
  border-radius: 8px;
}

.rain { color: #1976d2; font-weight: bold; }
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  天気情報
</div>

<div id="menu" class="menu">
  <a href="index.html">単価表</a>
  <a href="weather.html">天気</a>
</div>

<div class="container">

  <h3>地域設定</h3>
  <input type="text" id="cityInput" placeholder="例: Fujisawa,JP">
  <button onclick="saveCity()">検索</button>

  <div id="weather"></div>

</div>

<script>
const apiKey = "04f70f5c20cca6c2bba4dd54ba444389";

function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

// 初期値（藤沢市）
let city = localStorage.getItem("city") || "Fujisawa,JP";
document.getElementById("cityInput").value = city;

function jpWeather(w) {
  if (w === "Clear") return "晴れ";
  if (w === "Clouds") return "曇り";
  if (w === "Rain") return "雨";
  return w;
}

function getMainWeather(arr) {
  const count = {};
  arr.forEach(w => count[w] = (count[w] || 0) + 1);
  return Object.keys(count).reduce((a, b) => count[a] > count[b] ? a : b);
}

function getWeather(city) {
  fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric&lang=ja`)
    .then(res => res.json())
    .then(data => {

      const daily = {};

      data.list.forEach(item => {
        const date = item.dt_txt.split(" ")[0];

        if (!daily[date]) {
          daily[date] = {
            minTemps: [],
            maxTemps: [],
            pops: [],
            weathers: []
          };
        }

        daily[date].minTemps.push(item.main.temp_min);
        daily[date].maxTemps.push(item.main.temp_max);
        daily[date].pops.push(item.pop || 0);
        daily[date].weathers.push(item.weather[0].main);
      });

      let html = `<h3>${data.city.name}</h3>`;
      const dates = Object.keys(daily).slice(0, 3);

      dates.forEach((date, index) => {
        const d = daily[date];

        const max = Math.max(...d.maxTemps).toFixed(1);
        const min = Math.min(...d.minTemps).toFixed(1);

        const avgPop = d.pops.reduce((a, b) => a + b, 0) / d.pops.length;
        const rainProb = Math.round(avgPop * 100);

        const half = Math.floor(d.weathers.length / 2);
        const first = getMainWeather(d.weathers.slice(0, half));
        const second = getMainWeather(d.weathers.slice(half));

        let weatherText = "";
        if (first === second) {
          weatherText = jpWeather(first);
        } else {
          weatherText = `${jpWeather(first)}のち${jpWeather(second)}`;
        }

        let label = ["今日", "明日", "明後日"][index];

        let rainText = "";
        if (rainProb >= 50) {
          rainText = `<div class="rain">☔ ${rainProb}%（雨っぽい）</div>`;
        } else if (rainProb >= 20) {
          rainText = `<div>🌂 ${rainProb}%（微妙）</div>`;
        } else {
          rainText = `<div>☀ ${rainProb}%（ほぼ降らない）</div>`;
        }

        html += `
          <div class="day">
            <b>${label} (${date})</b><br>
            ${weatherText}<br>
            最高: ${max}℃ / 最低: ${min}℃<br>
            ${rainText}
          </div>
        `;
      });

      document.getElementById("weather").innerHTML = html;
    });
}

function saveCity() {
  const newCity = document.getElementById("cityInput").value;
  localStorage.setItem("city", newCity);
  getWeather(newCity);
}

getWeather(city);
</script>

</body>
</html>
