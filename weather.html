<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気情報</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      text-align: center;
    }

    /* 🍔メニュー */
    #menuButton {
      font-size: 28px;
      position: fixed;
      top: 10px;
      left: 10px;
      cursor: pointer;
      z-index: 1000;
    }

    #menu {
      position: fixed;
      top: 0;
      left: -220px;
      width: 200px;
      height: 100%;
      background: #333;
      color: white;
      padding-top: 60px;
      transition: 0.3s;
    }

    #menu.open {
      left: 0;
    }

    #menu a {
      display: block;
      color: white;
      padding: 12px;
      text-decoration: none;
    }

    #menu a:hover {
      background: #555;
    }

    input {
      padding: 10px;
      width: 70%;
      font-size: 16px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    #weather {
      margin-top: 20px;
    }

    .day {
      margin-top: 15px;
      padding: 12px;
      background: #f1f8e9;
      border-radius: 8px;
    }

    .rain {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

<!-- 🍔 -->
<div id="menuButton" onclick="toggleMenu()">☰</div>

<div id="menu">
  <a href="index.html">単価表</a>
  <a href="weather.html">天気</a>
</div>

<h2>天気情報</h2>

<input id="cityInput" placeholder="例：Fujisawa, JP">
<br>
<button onclick="saveCity()">登録</button>

<div id="weather">読み込み中...</div>

<script>
const apiKey = "04f70f5c20cca6c2bba4dd54ba444389";

// 🍔
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

// 初期値（藤沢）
let city = localStorage.getItem("city") || "Fujisawa, JP";
document.getElementById("cityInput").value = city;

// 天気取得（平均降水確率）
function getWeather(city) {
  fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric&lang=ja`)
    .then(res => res.json())
    .then(data => {

      if (data.cod !== "200") {
        document.getElementById("weather").innerHTML = "取得失敗（都市名確認）";
        return;
      }

      const daily = {};

      data.list.forEach(item => {
        const date = item.dt_txt.split(" ")[0];

        if (!daily[date]) {
          daily[date] = {
            temps: [],
            pops: []
          };
        }

        daily[date].temps.push(item.main.temp);
        daily[date].pops.push(item.pop || 0);
      });

      let html = `<h3>${data.city.name}</h3>`;

      const dates = Object.keys(daily).slice(0, 3);

      dates.forEach((date, index) => {
        const temps = daily[date].temps;
        const max = Math.max(...temps).toFixed(1);
        const min = Math.min(...temps).toFixed(1);

        // ⭐ 平均降水確率
        const avgPop = daily[date].pops.reduce((a, b) => a + b, 0) / daily[date].pops.length;
        const rainProb = Math.round(avgPop * 100);

        let label = ["今日", "明日", "明後日"][index];

        let rainText = "";
        if (rainProb >= 50) {
          rainText = `<div class="rain">☔ ${rainProb}%（雨っぽい）</div>`;
        } else if (rainProb >= 20) {
          rainText = `<div>🌂 ${rainProb}%（微妙）</div>`;
        } else {
          rainText = `<div>☀ ${rainProb}%（ほぼ降らない）</div>`;
        }

        html += `
          <div class="day">
            <b>${label} (${date})</b><br>
            最高: ${max}℃ / 最低: ${min}℃<br>
            ${rainText}
          </div>
        `;
      });

      document.getElementById("weather").innerHTML = html;
    });
}

// 保存
function saveCity() {
  const newCity = document.getElementById("cityInput").value;
  localStorage.setItem("city", newCity);
  getWeather(newCity);
}

// 初回実行
getWeather(city);
</script>

</body>
</html>
