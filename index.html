<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>駆除費用シミュレーター</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="駆除見積">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; height: 44px; box-sizing: border-box; }
        .result-box { margin-top: 25px; padding: 20px; background-color: #f1f8e9; border-radius: 8px; text-align: center; }
        .price { font-size: 24px; color: #333; font-weight: bold; margin: 10px 0; }
        .tax { font-size: 14px; color: #666; }
        .note { color: #d32f2f; font-size: 14px; margin-top: 10px; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

    <div id="calculator">
        <h2>駆除費用シミュレーター</h2>

        <label>🎯 サービス種別</label>
        <select id="serviceType" onchange="calculate()">
            <option value="gokiburi">ゴキブリ駆除 (法人/店舗)</option>
            <option value="nezumi_biz">ネズミ駆除 (法人/店舗)</option>
            <option value="nezumi_home">ネズミ駆除 (個人宅)</option>
        </select>

        <label>📐 面積 (坪数)</label>
        <input type="number" id="area" value="10" min="1" step="0.5" oninput="calculate()">

        <div class="result-box">
            <div style="font-weight:bold;">概算お見積り (税抜)</div>
            <div class="price" id="totalPrice">90,000 円</div>
            <div class="tax" id="taxPrice">税込合計: 99,000 円</div>
        </div>

        <div id="alertNote" class="note"></div>
    </div>

    <script>
        function calculate() {
            const type = document.getElementById('serviceType').value;
            const area = parseFloat(document.getElementById('area').value) || 0;
            let price = 0;
            let note = "";

            if (type === 'gokiburi') {
                price = 90000;
                if (area > 10) {
                    price += (area - 10) * 3000;
                }
            } else if (type === 'nezumi_biz') {
                price = 320000;
                if (area > 20) {
                    price += (area - 20) * 5000;
                }
            } else if (type === 'nezumi_home') {
                price = 0;
                note = "⚠️ 個人宅は別途お見積りとなります";
            }

            if (type === 'nezumi_home') {
                document.getElementById('totalPrice').innerText = "要・現地調査";
                document.getElementById('taxPrice').innerText = "別途算出";
            } else {
                document.getElementById('totalPrice').innerText = price.toLocaleString() + " 円";
                document.getElementById('taxPrice').innerText = "税込合計: " + Math.floor(price * 1.1).toLocaleString() + " 円";
            }
            document.getElementById('alertNote').innerText = note;
        }

        // PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registered.'))
                .catch(err => console.log('Service Worker registration failed.', err));
            });
        }
    </script>

</body>
</html>
